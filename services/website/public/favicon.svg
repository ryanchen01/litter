<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0C0B0A"/>
  <!-- Simplified ginger kitten head -->
  <g transform="translate(6, 5)">
    <!-- Ears -->
    <polygon points="3,11 1,3 7,8" fill="#F59E0B"/>
    <polygon points="17,11 19,3 13,8" fill="#F59E0B"/>
    <!-- Head -->
    <rect x="2" y="8" width="16" height="14" rx="8" fill="#F59E0B"/>
    <!-- Eyes (happy) -->
    <path d="M 6 14 Q 8 11 10 14" stroke="#1F2937" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 10 14 Q 12 11 14 14" stroke="#1F2937" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <polygon points="9,16 11,16 10,17.5" fill="#1F2937"/>
  </g>
</svg>
