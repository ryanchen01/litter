<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — litter</title>
  <meta name="theme-color" content="#0C0B0A">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="nav-brand">
        <img src="/app-icon.png" alt="litter icon">
        <span>litter</span>
      </a>
      <div class="nav-links">
        <a href="https://github.com/dnakov/litter">github</a>
        <a href="/privacy">privacy</a>
        <a href="/terms">terms</a>
        <a href="/support">support</a>
      </div>
    </div>
  </nav>

  <section class="four-oh-four">
    <div class="container">
      <!-- lone charcoal kitten looking lost -->
      <div class="lost-kitten">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%">
          <g transform="translate(50, 30)">
            <!-- Ears -->
            <polygon points="15,60 10,20 35,45" fill="#374151" />
            <polygon points="85,60 90,20 65,45" fill="#374151" />
            <!-- Body -->
            <rect x="10" y="40" width="80" height="100" rx="40" fill="#374151" />
            <!-- Eyes — wide, looking around -->
            <circle cx="35" cy="78" r="8" fill="#F9FAFB" />
            <circle cx="65" cy="78" r="8" fill="#F9FAFB" />
            <circle cx="38" cy="78" r="3.5" fill="#1F2937" />
            <circle cx="68" cy="78" r="3.5" fill="#1F2937" />
            <!-- Nose -->
            <polygon points="46,90 54,90 50,95" fill="#F9FAFB" />
            <!-- Tail — question mark shape -->
            <path d="M 85 120 Q 120 100 110 70 Q 105 55 95 60" stroke="#374151" stroke-width="8" fill="none" stroke-linecap="round" />
            <circle cx="95" cy="68" r="5" fill="#374151" />
          </g>
        </svg>
      </div>
      <h1>404</h1>
      <p>this kitten wandered off. the page you're looking for doesn't exist.</p>
      <a href="/" class="btn btn-primary">go home</a>
    </div>
  </section>

</body>
</html>
